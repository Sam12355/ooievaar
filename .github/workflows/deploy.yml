name: Deploy WordPress to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files (Excluding Config & Uploads)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # We skip wp-config.php so we don't break the server's DB connection
        # We skip uploads so we don't overwrite live images with local ones
        exclude: |
          **/.git*
          **/node_modules/**
          wp-config.php
          wp-content/uploads/**
          wp-content/upgrade/**
          .htaccess
